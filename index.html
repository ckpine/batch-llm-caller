<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM batch caller</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-alt: #f8fafc;
      --text: #162033;
      --muted: #5b6780;
      --border: #d7deea;
      --accent: #1f6feb;
      --accent-dark: #1557b0;
      --success: #11795c;
      --danger: #b42318;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(31, 111, 235, 0.12), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      width: min(720px, calc(100% - 32px));
      margin: 40px auto 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(215, 222, 234, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.9rem, 4vw, 2.4rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .intro {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    textarea,
    input[type="text"],
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      color: inherit;
      background: #fff;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.5;
    }

    textarea:focus,
    input[type="text"]:focus,
    input[type="file"]:focus {
      outline: 3px solid rgba(31, 111, 235, 0.18);
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, background-color 120ms ease, opacity 120ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    #runButton {
      background: var(--accent);
      color: #fff;
    }

    #runButton:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    #downloadButton {
      background: #e6f4ee;
      color: var(--success);
      display: none;
    }

    .section {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid #e8edf5;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 1.05rem;
    }

    .status-box,
    .results {
      background: var(--panel-alt);
      border: 1px solid #e4eaf2;
      border-radius: 14px;
      padding: 16px;
    }

    .status-box {
      min-height: 84px;
      color: var(--muted);
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .result-item {
      background: #fff;
      border: 1px solid #e4eaf2;
      border-radius: 12px;
      padding: 14px;
    }

    .result-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .result-item p {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .placeholder {
      margin: 0;
      color: var(--muted);
    }

    .error {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>LLM batch caller</h1>
      <p class="intro">Upload a text or CSV file with one prompt per line, add a system prompt, and run the batch against LM Studio's local OpenAI-compatible endpoint.</p>

      <div class="field">
        <label for="systemPrompt">System prompt</label>
        <textarea id="systemPrompt" placeholder="You are a helpful assistant."></textarea>
      </div>

      <div class="field">
        <label for="promptFile">Prompt file (.txt or .csv)</label>
        <input id="promptFile" type="file" accept=".txt,.csv,text/plain,text/csv">
      </div>

      <div class="field">
        <label for="modelName">Model name</label>
        <input id="modelName" type="text" value="qwen3.5-0.8b" spellcheck="false">
      </div>

      <div class="actions">
        <button id="runButton" type="button">Run</button>
        <button id="downloadButton" type="button">Download CSV</button>
      </div>

      <section class="section">
        <h2>Status</h2>
        <div id="status" class="status-box">Waiting for a file.</div>
      </section>

      <section class="section">
        <h2>Results</h2>
        <div id="results" class="results">
          <p class="placeholder">Results will appear here after processing begins.</p>
        </div>
      </section>
    </section>
  </main>

  <script>
    const endpoint = "http://localhost:1234/v1/chat/completions";

    const systemPromptEl = document.getElementById("systemPrompt");
    const promptFileEl = document.getElementById("promptFile");
    const modelNameEl = document.getElementById("modelName");
    const runButtonEl = document.getElementById("runButton");
    const downloadButtonEl = document.getElementById("downloadButton");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");

    let batchResults = [];

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(typeof reader.result === "string" ? reader.result : "");
        reader.onerror = () => reject(new Error("Unable to read the selected file."));
        reader.readAsText(file);
      });
    }

    function parseLines(fileText) {
      return fileText
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderResults() {
      if (batchResults.length === 0) {
        resultsEl.innerHTML = '<p class="placeholder">Results will appear here after processing begins.</p>';
        return;
      }

      resultsEl.innerHTML = batchResults.map((item) => `
        <article class="result-item">
          <strong>Row ${item.row_number} input</strong>
          <p>${escapeHtml(item.input)}</p>
          <strong>Response</strong>
          <p>${escapeHtml(item.response)}</p>
        </article>
      `).join("");
    }

    function csvEscape(value) {
      const stringValue = String(value ?? "");
      if (/[",\n\r]/.test(stringValue)) {
        return `"${stringValue.replace(/"/g, '""')}"`;
      }
      return stringValue;
    }

    function buildCsv(rows) {
      const header = ["row_number", "input", "response"];
      const lines = [header.join(",")];

      for (const row of rows) {
        lines.push([
          csvEscape(row.row_number),
          csvEscape(row.input),
          csvEscape(row.response)
        ].join(","));
      }

      return lines.join("\r\n");
    }

    function downloadCsv() {
      const csvContent = buildCsv(batchResults);
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "results.csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function callModel(model, systemPrompt, input) {
      const response = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model,
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: input }
          ]
        })
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`HTTP ${response.status}: ${errorText || response.statusText}`);
      }

      const data = await response.json();
      const content = data && data.choices && data.choices[0] && data.choices[0].message
        ? data.choices[0].message.content
        : "";

      if (typeof content === "string") {
        return content;
      }

      if (Array.isArray(content)) {
        return content.map((part) => {
          if (typeof part === "string") {
            return part;
          }
          if (part && typeof part.text === "string") {
            return part.text;
          }
          return JSON.stringify(part);
        }).join("\n");
      }

      return content == null ? "" : JSON.stringify(content);
    }

    async function runBatch() {
      const selectedFile = promptFileEl.files && promptFileEl.files[0];
      const modelName = modelNameEl.value.trim() || "qwen3.5-0.8b";
      const systemPrompt = systemPromptEl.value;

      if (!selectedFile) {
        setStatus("Select a .txt or .csv file before running.", true);
        return;
      }

      runButtonEl.disabled = true;
      downloadButtonEl.style.display = "none";
      batchResults = [];
      renderResults();
      setStatus("Reading file...");

      try {
        const fileText = await readFileAsText(selectedFile);
        const lines = parseLines(fileText);

        if (lines.length === 0) {
          setStatus("The selected file does not contain any non-empty lines to process.", true);
          return;
        }

        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index];
          setStatus(`Processing ${index + 1} of ${lines.length}...`);

          let responseText = "";

          try {
            responseText = await callModel(modelName, systemPrompt, line);
          } catch (error) {
            responseText = error instanceof Error ? error.message : String(error);
          }

          batchResults.push({
            row_number: index + 1,
            input: line,
            response: responseText
          });

          renderResults();
        }

        setStatus(`Completed ${batchResults.length} of ${lines.length} rows.`);
        downloadButtonEl.style.display = "inline-flex";
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        setStatus(message, true);
      } finally {
        runButtonEl.disabled = false;
      }
    }

    runButtonEl.addEventListener("click", runBatch);
    downloadButtonEl.addEventListener("click", downloadCsv);
  </script>
</body>
</html>
